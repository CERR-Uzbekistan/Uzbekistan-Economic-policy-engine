russia_real_gdp_growth_deviation_pp:
  chosen_stagnation: -1.0
  chosen_recession: -3.0
  chosen_combined_shock: -5.0
  unit: percentage_points_vs_recent_wartime_growth
  evidence_strength: medium
  evidence_basis: Russia moved from strong wartime growth around 2024-2025 toward IMF/World Bank-style forecasts near 0.6-1.0 percent growth; central -3pp approximates the fall from recent high growth to low-growth stagnation.
  primary_source: IMF forecast context reported by Business Insider and Guardian; World Bank forecast context reported by WSJ.
  source_url: https://www.businessinsider.com/russia-economy-imf-downgrade-gdp-growth-outlook-wartime-boom-fast-2025-7
  current_status: evidence_informed_not_econometrically_estimated

russia_real_wage_shock_pct:
  chosen_stagnation: -3.0
  chosen_recession: -8.0
  chosen_combined_shock: -15.0
  unit: percent
  evidence_strength: low
  evidence_basis: Reports point to cooling activity, high interest rates, job-loss risks, and wage pressure, but no Russia migrant-sector wage series is wired into the project.
  primary_source: public reporting on Russia slowdown and falling wage/job-loss risks.
  source_url: https://nypost.com/2026/07/01/world-news/putins-top-banker-begs-for-end-to-ukraine-war-in-stark-warning/
  current_status: judgemental_placeholder_pending_rosstat_or_migrant_sector_wage_data

